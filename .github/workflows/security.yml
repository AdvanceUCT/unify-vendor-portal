name: Security

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  dependency-audit:
    name: security-dependency-audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Node project
        id: node
        shell: bash
        run: |
          if [ -f package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No package.json yet. Security audit scaffold is ready."
          fi

      - name: Set up Node.js
        if: steps.node.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Audit dependencies
        if: steps.node.outputs.present == 'true'
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm audit --audit-level=high
          else
            echo "No package-lock.json found. Skipping npm audit until dependencies are locked."
          fi

